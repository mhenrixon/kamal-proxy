name: Docker

on:
  workflow_dispatch:
    inputs:
      tagInput:
        description: 'Tag'
        required: true

  push:
    # Four-segment fork tags only (vX.Y.Z.N) - upstream's vX.Y.Z tags never match.
    tags: [ "v[0-9]+.[0-9]+.[0-9]+.[0-9]+" ]

permissions: {}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine version tag
        id: version-tag
        run: |
          INPUT_VALUE="${GITHUB_EVENT_INPUTS_TAGINPUT}"
          if [ -z "$INPUT_VALUE" ]; then
            INPUT_VALUE="${GITHUB_REF_NAME}"
          fi
          echo "value=$INPUT_VALUE" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_INPUTS_TAGINPUT: ${{ github.event.inputs.tagInput }}
      -
        name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # kamal prunes proxy images by this label - it must match upstream's.
          labels: |
            org.opencontainers.image.title=kamal-proxy
          tags: |
            ghcr.io/mhenrixon/kamal-proxy:latest
            ghcr.io/mhenrixon/kamal-proxy:${{ steps.version-tag.outputs.value }}
